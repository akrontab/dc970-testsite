<header class="site-header">
  <div class="container">
    <div class="site-header__brand">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      {% if site.tagline %}
        <span class="site-tagline">{{ site.tagline }}</span>
      {% endif %}
    </div>
    <nav class="site-nav">
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
  </div>
</header>
